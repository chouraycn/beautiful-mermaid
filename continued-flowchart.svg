<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 611.6326666666666 1052.1599999999999" width="611.6326666666666" height="1052.1599999999999" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;--surface:#24283b;--border:#414868;background:var(--bg);--_line:#3d59a1;--_arrow:#3d59a1;--_text:#a9b1d6;--_text-sec:#565f89;--_text-muted:#565f89;--_node-fill:#1a1b26;--_node-stroke:#565f89;--_group-fill:#7aa2f718;--_group-hdr:#7aa2f7;--_inner-stroke:#565f89" id="bm-diagram-1">
<style>
#bm-diagram-1 {
  /* 覆盖 CSS 变量 */
  --_text:       #a9b1d6       !important;
  --_text-sec:   #565f89 !important;
  --_line:       #3d59a1      !important;
  --_arrow:      #3d59a1      !important;
  --_node-fill:  #1a1b26       !important;
  --_node-stroke:#565f89    !important;
  --_group-fill: #7aa2f718 !important;
  --_group-hdr:  #7aa2f7 !important;
}
#bm-diagram-1 text {
  font-family: 'SF Pro Text', sans-serif !important;
  font-size:   13px !important;
  dominant-baseline: central;
  dy: 0.35em;
}
/* 直接覆盖元素属性 */
#bm-diagram-1 rect[fill="var(--_node-fill)"],
#bm-diagram-1 circle[fill="var(--_node-fill)"],
#bm-diagram-1 ellipse[fill="var(--_node-fill)"],
#bm-diagram-1 polygon[fill="var(--_node-fill)"] {
  fill:         #1a1b26        !important;
  stroke:       #565f89     !important;
  stroke-width: 1px !important;
  rx:           12px !important;
  ry:           12px !important;
  filter: drop-shadow(0 8px 16px rgba(255,255,255,0.1)) !important;
}
/* 节点文字 */
#bm-diagram-1 g.node text {
  fill: #a9b1d6 !important;
}
/* 子图/cluster 标题 */
#bm-diagram-1 .cluster-label text {
  fill:        #7aa2f7 !important;
  font-size:   12px !important;
  font-weight: 600 !important;
}
/* 边/连线 */
#bm-diagram-1 .edge, #bm-diagram-1 .edgePath .path {
  stroke:       #3d59a1  !important;
  stroke-width: 1.5px !important;
}
#bm-diagram-1 path {
  stroke:       #3d59a1  !important;
  stroke-width: 1.5px !important;
}
/* 箭头 */
#bm-diagram-1 .arrowhead polygon,
#bm-diagram-1 marker polygon {
  stroke: #3d59a1 !important;
  fill:   #3d59a1 !important;
}
/* 边标签 */
#bm-diagram-1 .edgeLabel text {
  fill:      #565f89 !important;
  font-size: 11px  !important;
}</style><style> @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap'); text { font-family: 'Inter', system-ui, sans-serif; } svg { /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */ --_text: var(--fg); --_text-sec: var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg))); --_text-muted: var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg))); --_text-faint: color-mix(in srgb, var(--fg) 25%, var(--bg)); --_line: var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg))); --_arrow: var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg))); --_node-fill: var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg))); --_node-stroke: var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg))); --_group-fill: var(--bg); --_group-hdr: color-mix(in srgb, var(--fg) 5%, var(--bg)); --_inner-stroke: color-mix(in srgb, var(--fg) 12%, var(--bg)); --_key-badge: color-mix(in srgb, var(--fg) 10%, var(--bg)); } </style><defs><marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 8 2.5, 0 5" stroke-width="0.75" stroke-linejoin="round" /></marker><marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse"><polygon points="8 0, 0 2.5, 8 5" stroke-width="0.75" stroke-linejoin="round" /></marker></defs><polyline class="edge" data-from="Start" data-to="Input" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="263.84166666666664,830.3599999999998 263.84166666666664,854.3599999999999 222.7208333333333,854.3599999999999 222.7208333333333,878.3599999999999" stroke-width="1" marker-end="url(#arrowhead)" /><polyline class="edge" data-from="Input" data-to="Validate" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="179.09749999999997,878.3599999999999 179.09749999999997,854.3599999999999 40.039999999999964,854.3599999999999 40.039999999999964,599.6599999999999 83.31499999